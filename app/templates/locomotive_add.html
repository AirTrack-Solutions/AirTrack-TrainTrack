{% extends "base.html" %}
{% block title %}Add Locomotive{% endblock %}
{% block content %}
<div class="tt-page-header">
  <div><div class="tt-page-label"><a href="{{ url_for('locomotive.index') }}">Locomotives</a> / Add</div><h1 class="tt-page-title">Add Locomotive</h1></div>
</div>
<div class="tt-content-card">
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="tt-form-grid">
      <div class="tt-form-group"><label>{{ profile.labels.number }} *</label><input type="text" name="number" required placeholder="e.g. 66001" autofocus></div>
      <div class="tt-form-group"><label>Name</label><input type="text" name="name" placeholder="e.g. Flying Scotsman"></div>
      <div class="tt-form-group"><label>{{ profile.labels['class'] }}</label><select name="class_id"><option value="">— Select class —</option>{% for c in classes %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>Type</label><select name="type_id"><option value="">— Select type —</option>{% for t in types %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>{{ profile.labels.operator }}</label><select name="operator_id"><option value="">— Select operator —</option>{% for o in operators %}<option value="{{ o.id }}">{{ o.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>{{ profile.labels.depot }}</label><select name="depot_id"><option value="">— Select depot —</option>{% for d in depots %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>{{ profile.labels.livery }}</label><input type="text" name="livery" placeholder="e.g. Freightliner Grey"></div>
      <div class="tt-form-group"><label>{{ profile.labels.year_built }}</label><input type="number" name="built_year" min="1800" max="2099" placeholder="e.g. 1998"></div>
      <div class="tt-form-group"><label>{{ profile.labels.status }}</label><select name="status">{% for s in ['active','withdrawn','preserved','stored','scrapped','maintenance','transferred'] %}<option value="{{ s }}">{{ s|capitalize }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>Country</label><select name="country_code"><option value="">— Select country —</option>{% for c in countries %}<option value="{{ c.code }}">{{ c.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group" style="grid-column:1/-1;"><label>Notes</label><textarea name="notes" rows="3"></textarea></div>
      <div class="tt-form-group" style="grid-column:1/-1;">
        <label>Photo</label>
        <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" style="padding:4px;">
        <small style="color:#999;font-family:'Times New Roman',serif;">JPG, PNG or WEBP, max 5MB</small>
      </div>
    </div>
    <div class="tt-form-actions">
      <button type="submit" class="tt-btn tt-btn-primary">Save Locomotive</button>
      <a href="{{ url_for('locomotive.index') }}" class="tt-btn tt-btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
