{% extends "base.html" %}
{% block title %}Add Location{% endblock %}
{% block content %}
<div class="tt-page-header">
  <div><div class="tt-page-label"><a href="{{ url_for('location.index') }}" style="color:var(--muted);text-decoration:none;">Locations</a> / Add</div>
  <h1 class="tt-page-title">Add Location</h1></div>
</div>
<div class="tt-content-card"><form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="tt-form-grid">
    <div class="tt-form-group"><label>Name *</label><input type="text" name="name" required placeholder="e.g. Crewe Station"></div>
    <div class="tt-form-group"><label>Station Code</label><input type="text" name="station_code" placeholder="e.g. CRE"></div>
    <div class="tt-form-group"><label>Line / Route</label><input type="text" name="line" placeholder="e.g. West Coast Main Line"></div>
    <div class="tt-form-group"><label>Country</label><select name="country_code"><option value="">— Select —</option>{% for c in countries %}<option value="{{ c.code }}">{{ c.name }}</option>{% endfor %}</select></div>
    <div class="tt-form-group"><label>Latitude</label><input type="number" name="lat" step="0.000001" placeholder="e.g. 53.0880"></div>
    <div class="tt-form-group"><label>Longitude</label><input type="number" name="lng" step="0.000001" placeholder="e.g. -2.4360"></div>
    <div class="tt-form-group" style="grid-column:1/-1;"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
  </div>
  <div class="tt-form-actions"><button type="submit" class="tt-btn tt-btn-primary">Save</button><a href="{{ url_for('location.index') }}" class="tt-btn tt-btn-outline">Cancel</a></div>
</form></div>
{% endblock %}
