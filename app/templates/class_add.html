{% extends "base.html" %}
{% block title %}Add Class{% endblock %}
{% block content %}
<div class="tt-page-header">
  <div>
    <div class="tt-page-label"><a href="{{ url_for('loco_class.index') }}" style="color:var(--muted);text-decoration:none;">Classes</a> / Add</div>
    <h1 class="tt-page-title">Add Class</h1>
  </div>
</div>

<div class="tt-content-card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="tt-form-grid">
      <div class="tt-form-group">
        <label>Name *</label>
        <input type="text" name="name" required placeholder="e.g. Class 66">
      </div>
      <div class="tt-form-group">
        <label>Type</label>
        <select name="type_id">
          <option value="">— Select —</option>
          {% for t in types %}
          <option value="{{ t.id }}">{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="tt-form-group">
        <label>Manufacturer</label>
        <input type="text" name="manufacturer" placeholder="e.g. EMD">
      </div>
      <div class="tt-form-group">
        <label>Introduced Year</label>
        <input type="number" name="introduced_year" placeholder="e.g. 1998" min="1800" max="2099">
      </div>
      <div class="tt-form-group">
        <label>Country</label>
        <select name="country_code">
          <option value="">— Select —</option>
          {% for c in countries %}
          <option value="{{ c.code }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="tt-form-group" style="grid-column:1/-1;">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Optional notes about this class"></textarea>
      </div>
    </div>
    <div class="tt-form-actions">
      <button type="submit" class="tt-btn tt-btn-primary">Save</button>
      <a href="{{ url_for('loco_class.index') }}" class="tt-btn tt-btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
