{% extends "base.html" %}
{% block title %}Add Depot{% endblock %}
{% block content %}
<div class="tt-page-header">
  <div>
    <div class="tt-page-label"><a href="{{ url_for('depot.index') }}" style="color:var(--muted);text-decoration:none;">Depots</a> / Add</div>
    <h1 class="tt-page-title">Add Depot</h1>
  </div>
</div>

<div class="tt-content-card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="tt-form-grid">
      <div class="tt-form-group">
        <label>Name *</label>
        <input type="text" name="name" required placeholder="e.g. Toton TMD">
      </div>
      <div class="tt-form-group">
        <label>Code</label>
        <input type="text" name="code" placeholder="e.g. TO">
      </div>
      <div class="tt-form-group">
        <label>Operator</label>
        <select name="operator_id">
          <option value="">— Select —</option>
          {% for o in operators %}
          <option value="{{ o.id }}">{{ o.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="tt-form-group">
        <label>Country</label>
        <select name="country_code">
          <option value="">— Select —</option>
          {% for c in countries %}
          <option value="{{ c.code }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="tt-form-group" style="grid-column:1/-1;">
        <label>Notes</label>
        <textarea name="notes" rows="2"></textarea>
      </div>
    </div>
    <div class="tt-form-actions">
      <button type="submit" class="tt-btn tt-btn-primary">Save</button>
      <a href="{{ url_for('depot.index') }}" class="tt-btn tt-btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
