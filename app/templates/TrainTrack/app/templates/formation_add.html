{% extends "base.html" %}
{% block title %}Add Formation{% endblock %}
{% block content %}
<div class="tt-page-header">
  <div><div class="tt-page-label"><a href="{{ url_for('formation.index') }}" style="color:var(--muted);text-decoration:none;">Formations</a> / Add</div>
  <h1 class="tt-page-title">Add Formation</h1></div>
</div>
<div class="tt-content-card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="tt-form-grid">
      <div class="tt-form-group"><label>Set Number *</label><input type="text" name="set_number" required placeholder="e.g. 158801"></div>
      <div class="tt-form-group"><label>Class</label><select name="class_id"><option value="">— Select —</option>{% for c in classes %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>Operator</label><select name="operator_id"><option value="">— Select —</option>{% for o in operators %}<option value="{{ o.id }}">{{ o.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>Status</label><select name="status"><option value="active">Active</option><option value="withdrawn">Withdrawn</option><option value="stored">Stored</option><option value="scrapped">Scrapped</option></select></div>
      <div class="tt-form-group" style="grid-column:1/-1;"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
    </div>
    <div style="margin-top:1.5rem;"><div class="card-title" style="color:#7a1a0a;font-family:Times New Roman,serif;font-weight:bold;margin-bottom:12px;">Vehicles</div>
      <div id="vehicles">
        <div class="form-grid vehicle-row" style="margin-bottom:0.6rem;">
          <div class="tt-form-group"><label>Vehicle Number</label><input type="text" name="vehicle_number[]" placeholder="e.g. 52801"></div>
          <div class="tt-form-group"><label>Type</label><input type="text" name="vehicle_type[]" placeholder="e.g. DMC"></div>
          <div class="tt-form-group"><label>Position</label><input type="number" name="vehicle_position[]" placeholder="1" min="1"></div>
        </div>
      </div>
      <button type="button" class="tt-btn tt-btn-outline" onclick="addVehicle()" style="margin-top:0.6rem;">+ Add Vehicle</button>
    </div>
    <div class="tt-form-actions">
      <button type="submit" class="tt-btn tt-btn-primary">Save Formation</button>
      <a href="{{ url_for('formation.index') }}" class="tt-btn tt-btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
function addVehicle() {
  const tmpl = document.querySelector('.vehicle-row').cloneNode(true);
  tmpl.querySelectorAll('input').forEach(i => i.value = '');
  document.getElementById('vehicles').appendChild(tmpl);
}
</script>
{% endblock %}
