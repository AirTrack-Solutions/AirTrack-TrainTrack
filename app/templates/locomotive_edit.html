{% extends "base.html" %}
{% block title %}Edit {{ loco.number }}{% endblock %}
{% block content %}
<div class="tt-page-header">
  <div><div class="tt-page-label"><a href="{{ url_for('locomotive.detail', loco_id=loco.id) }}">{{ loco.number }}</a> / Edit</div><h1 class="tt-page-title">Edit {{ loco.number }}</h1></div>
</div>
<div class="tt-content-card">
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="tt-form-grid">
      <div class="tt-form-group"><label>{{ profile.labels.number }} *</label><input type="text" name="number" value="{{ loco.number }}" required></div>
      <div class="tt-form-group"><label>Name</label><input type="text" name="name" value="{{ loco.name or '' }}"></div>
      <div class="tt-form-group"><label>{{ profile.labels['class'] }}</label><select name="class_id"><option value="">— Select —</option>{% for c in classes %}<option value="{{ c.id }}" {{ 'selected' if loco.class_id == c.id }}>{{ c.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>Type</label><select name="type_id"><option value="">— Select —</option>{% for t in types %}<option value="{{ t.id }}" {{ 'selected' if loco.type_id == t.id }}>{{ t.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>{{ profile.labels.operator }}</label><select name="operator_id"><option value="">— Select —</option>{% for o in operators %}<option value="{{ o.id }}" {{ 'selected' if loco.operator_id == o.id }}>{{ o.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>{{ profile.labels.depot }}</label><select name="depot_id"><option value="">— Select —</option>{% for d in depots %}<option value="{{ d.id }}" {{ 'selected' if loco.depot_id == d.id }}>{{ d.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>{{ profile.labels.livery }}</label><input type="text" name="livery" value="{{ loco.livery or '' }}"></div>
      <div class="tt-form-group"><label>{{ profile.labels.year_built }}</label><input type="number" name="built_year" value="{{ loco.built_year or '' }}" min="1800" max="2099"></div>
      <div class="tt-form-group"><label>{{ profile.labels.status }}</label><select name="status">{% for s in ['active','withdrawn','preserved','stored','scrapped','maintenance','transferred'] %}<option value="{{ s }}" {{ 'selected' if loco.status == s }}>{{ s|capitalize }}</option>{% endfor %}</select></div>
      <div class="tt-form-group"><label>Country</label><select name="country_code"><option value="">— Select —</option>{% for c in countries %}<option value="{{ c.code }}" {{ 'selected' if loco.country_code == c.code }}>{{ c.name }}</option>{% endfor %}</select></div>
      <div class="tt-form-group" style="grid-column:1/-1;"><label>Notes</label><textarea name="notes" rows="3">{{ loco.notes or '' }}</textarea></div>
      <div class="tt-form-group" style="grid-column:1/-1;">
        <label>Photo</label>
        {% if loco.image %}
        <div style="margin-bottom:8px;">
          <img src="{{ url_for('static', filename='images/locos/' + loco.image) }}"
               alt="{{ loco.number }}"
               style="max-height:120px;border-radius:4px;border:1px solid #ddd;">
          <label style="display:inline-flex;align-items:center;gap:6px;margin-left:12px;color:#999;font-size:0.85rem;cursor:pointer;">
            <input type="checkbox" name="delete_image" value="1"> Remove photo
          </label>
        </div>
        {% endif %}
        <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" style="padding:4px;">
        <small style="color:#999;font-family:'Times New Roman',serif;">JPG, PNG or WEBP, max 5MB</small>
      </div>
    </div>
    <div class="tt-form-actions">
      <button type="submit" class="tt-btn tt-btn-primary">Save Changes</button>
      <a href="{{ url_for('locomotive.detail', loco_id=loco.id) }}" class="tt-btn tt-btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
